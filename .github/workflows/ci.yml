name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6.6.1
        with:
          version: "0.8.3"
      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --all-packages --all-extras --frozen
      - name: Compile
        run: uv run python -m compileall -q packages verticals tests
      - name: Lint
        run: uv run ruff check .
      - name: Typecheck changed production surfaces
        run: >-
          uv run mypy
          packages/cli/src/agentgraph_cli/cli.py
          packages/core/src/agentgraph_core/audit.py
          packages/core/src/agentgraph_core/redaction.py
          packages/runtime/src/agentgraph_runtime/checkpoint.py
          packages/runtime/src/agentgraph_runtime/runtime.py
          packages/server/src/agentgraph_server/app.py
          scripts/sota_collect.py
      - name: Test
        run: ./scripts/test.sh
      - name: Build packages
        run: uv build --all-packages
      - name: Server smoke
        run: uv run --all-packages python scripts/smoke_server.py
      - name: Compose contract
        run: AG_API_KEY=ci-only AG_LLM_PROVIDER=ollama docker compose config --quiet
