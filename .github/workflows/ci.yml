name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --all-packages --all-extras
      - name: Lint
        run: uv run --project . ruff check .
      - name: Typecheck
        run: uv run --project . mypy packages verticals || true
      - name: Test
        run: uv run --project packages/runtime pytest -q
