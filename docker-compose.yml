# Compose stack: Postgres + the AgentGraph server + all 7 vertical services + UI.
#
# Usage:
#   cp .env.example .env   # set OPENAI_API_KEY (or ANTHROPIC) and AG_API_KEY
#   docker compose up --build
#   curl -s localhost:8080/healthz
#
# All services share one Postgres database for durable checkpoints + audit.

x-ag-env: &ag-env
  AG_STORAGE_URL: postgresql://agentgraph:agentgraph@postgres:5432/agentgraph
  AG_LLM_PROVIDER: ${AG_LLM_PROVIDER:-openai}
  AG_LLM_MODEL: ${AG_LLM_MODEL:-gpt-4o-mini}
  AG_API_KEY: ${AG_API_KEY:?set AG_API_KEY in your .env}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  AG_HOST: 0.0.0.0

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: agentgraph
      POSTGRES_PASSWORD: agentgraph
      POSTGRES_DB: agentgraph
    ports:
      - "5432:5432"
    volumes:
      - ag_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentgraph"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    environment:
      <<: *ag-env
      AG_PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  sales-ops:
    build: { context: ., dockerfile: docker/Dockerfile.sales-ops }
    environment:
      <<: *ag-env
      AG_PORT: "8081"
    ports: ["8081:8081"]
    depends_on:
      postgres: { condition: service_healthy }

  support-ops:
    build: { context: ., dockerfile: docker/Dockerfile.support-ops }
    environment:
      <<: *ag-env
      AG_PORT: "8082"
    ports: ["8082:8082"]
    depends_on:
      postgres: { condition: service_healthy }

  compliance:
    build: { context: ., dockerfile: docker/Dockerfile.compliance }
    environment:
      <<: *ag-env
      AG_PORT: "8083"
    ports: ["8083:8083"]
    depends_on:
      postgres: { condition: service_healthy }

  recruiting:
    build: { context: ., dockerfile: docker/Dockerfile.recruiting }
    environment:
      <<: *ag-env
      AG_PORT: "8084"
    ports: ["8084:8084"]
    depends_on:
      postgres: { condition: service_healthy }

  insurance:
    build: { context: ., dockerfile: docker/Dockerfile.insurance }
    environment:
      <<: *ag-env
      AG_PORT: "8085"
    ports: ["8085:8085"]
    depends_on:
      postgres: { condition: service_healthy }

  construction:
    build: { context: ., dockerfile: docker/Dockerfile.construction }
    environment:
      <<: *ag-env
      AG_PORT: "8086"
    ports: ["8086:8086"]
    depends_on:
      postgres: { condition: service_healthy }

  healthcare:
    build: { context: ., dockerfile: docker/Dockerfile.healthcare }
    environment:
      <<: *ag-env
      AG_PORT: "8087"
    ports: ["8087:8087"]
    depends_on:
      postgres: { condition: service_healthy }

  ui:
    build: { context: ., dockerfile: docker/Dockerfile.ui }
    environment:
      AGENTGRAPH_SERVER: http://server:8080
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  ag_pg:
