[project]
name = "agentgraph-runtime"
version = "0.1.0"
description = "Graph-based execution engine with durable checkpoints."
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "AgentGraph Authors" }]
dependencies = [
    "pydantic>=2.6",
    "agentgraph-core",
    "agentgraph-llm",
    "structlog>=24.1",
    "orjson>=3.10",
]

[project.optional-dependencies]
postgres = ["asyncpg>=0.29", "sqlalchemy[asyncio]>=2.0"]
redis = ["redis>=5.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentgraph_runtime"]
