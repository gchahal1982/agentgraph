[project]
name = "agentgraph-llm"
version = "0.1.0"
description = "Provider-agnostic LLM adapter for AgentGraph."
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "AgentGraph Authors" }]
dependencies = [
    "pydantic>=2.6",
    "httpx>=0.27",
    "orjson>=3.10",
    "agentgraph-core",
]

[project.optional-dependencies]
openai = ["openai>=1.30"]
anthropic = ["anthropic>=0.28"]
all = ["openai>=1.30", "anthropic>=0.28"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentgraph_llm"]
