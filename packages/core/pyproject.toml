[project]
name = "agentgraph-core"
version = "0.1.0"
description = "Core primitives for AgentGraph: agents, tools, memory, audit, RBAC."
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "AgentGraph Authors" }]
dependencies = [
    "pydantic>=2.6",
    "typing-extensions>=4.10",
    "ulid-py>=1.1",
    "structlog>=24.1",
    "orjson>=3.10",
]

[project.optional-dependencies]
postgres = ["asyncpg>=0.29"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentgraph_core"]
